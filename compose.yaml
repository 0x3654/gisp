name: registry
services:
  postgres_registry:
    image: docker.io/pgvector/pgvector:pg16
    container_name: gisp_pg
    shm_size: ${PG_SHM_SIZE:-2g}
    env_file: .env
    command: >
      postgres
      -c shared_preload_libraries=pg_prewarm
      -c pg_prewarm.autoprewarm=on
      -c pg_prewarm.autoprewarm_interval=${PG_AUTOPREWARM_INTERVAL:-120}
      -c pg_prewarm.autoprewarm_startup=on
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - ./services/postgres/data:/var/lib/postgresql/data
      - ./services/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -h 127.0.0.1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
       - internal
  api:
    image: docker.io/0x3654/gisp-api:latest
    container_name: gisp_api
    labels:
      - com.centurylinklabs.watchtower.enable=true
    env_file: .env
    environment:
      - TZ=${TZ:-Europe/Moscow}
      - API_PORT=${API_PORT:-8000}
    ports:
      - '${API_PORT:-8000}:8000'
    depends_on:
      postgres_registry:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python
        - -c
        - |
          import urllib.request, sys, os
          try:
              port = os.getenv('API_PORT', '8000')
              urllib.request.urlopen(f"http://127.0.0.1:{port}/docs", timeout=5)
          except Exception:
              sys.exit(1)
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
        - internal
  import:
    image: docker.io/0x3654/gisp-import:latest
    container_name: gisp_import
    labels:
      - com.centurylinklabs.watchtower.enable=true
    profiles:
      - tasks
    env_file: .env
    environment:
      - TZ=${TZ:-Europe/Moscow}
      - POSTGRES_HOST=postgres_registry
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
    volumes:
      - ./logs:/var/log/registry
      # Code is in image (moved to /src/import/)
      - ./files:/files:ro  # Read-only - import только читает, downloader пишет
    depends_on:
      postgres_registry:
        condition: service_healthy
      semantic:
        condition: service_healthy
    restart: "no"  # Run-once like downloader
    networks:
      - internal
  openwebui:
    image: ghcr.io/open-webui/open-webui
    container_name: gisp_openwebui
    ports:
      - '${OPENWEBUI_PORT:-3333}:8080'
    volumes:
      - ./services/openwebui/data:/app/backend/data
    healthcheck:
      test:
        - CMD-SHELL
        - python
        - -c
        - |
          import urllib.request, sys
          url = "http://127.0.0.1:8080/health"
          try:
              urllib.request.urlopen(url, timeout=5)
          except Exception:
              sys.exit(1)
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    networks:
      - internal
      - external
  downloader:
    image: docker.io/0x3654/gisp-downloader:latest
    container_name: gisp_downloader
    labels:
      - com.centurylinklabs.watchtower.enable=true
    profiles:
      - tasks
    env_file: .env
    environment:
      - TZ=${TZ:-Europe/Moscow}
      - FILES_DIR=/files
      - MAX_CSV_FILES=${MAX_CSV_FILES:-7}
      # Download method: direct (для проды в РФ) или ssh-tunnel (для разработки вне РФ)
      - DOWNLOAD_METHOD=${DOWNLOAD_METHOD:-direct}
      # SSH tunnel settings (только для DOWNLOAD_METHOD=ssh-tunnel)
      - SSH_HOST=${DOWNLOADER_SSH_HOST:-}
      - SSH_PORT=${DOWNLOADER_SSH_PORT:-22}
      - SSH_USER=${DOWNLOADER_SSH_USER:-}
      - SSH_KEY_B64=${DOWNLOADER_SSH_KEY_B64:-}
    volumes:
      - ./files:/files
    # external network (не internal: true) — downloader нужен интернет, БД не нужна
    networks:
      - external
    restart: "no"
  openwebui-sync:
    image: docker.io/0x3654/gisp-openwebui-sync:latest
    container_name: gisp_openwebui-sync
    labels:
      - com.centurylinklabs.watchtower.enable=true
    profiles: ["tools"]
    volumes:
      # Only data volume needed - code is in image
      - ./services/openwebui/data:/data
    working_dir: /app
    entrypoint:
      - python
      - /app/reestr_sync.py
      - --db
      - /data/webui.db
      - --function-id
      - reestr
    depends_on:
      - openwebui
    restart: "no"
  # Semantic service (sentence embeddings)
  # По умолчанию использует gisp-semantic-onnx (оптимально для обеих архитектур)
  # Для переключения на PyTorch замените image: на docker.io/0x3654/gisp-semantic-pytorch:latest
  # Бенчмарки Python 3.12 + pymorphy3:
  # - AMD64 ONNX: ~1.03GB, 27-32ms (рекомендуется)
  # - AMD64 PyTorch: ~1.93GB, 28-35ms
  # - ARM64 ONNX: ~1.69GB, 37-44ms (рекомендуется)
  # - ARM64 PyTorch: ~2.46GB, 104-186ms
  semantic:
    image: docker.io/0x3654/gisp-semantic-onnx:latest
    container_name: gisp_semantic
    labels:
      - com.centurylinklabs.watchtower.enable=true
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - TZ=${TZ:-Europe/Moscow}
      - SEMANTIC_PORT=${SEMANTIC_PORT:-8010}
    volumes:
      - ./services/semantic/synonyms.json:/app/synonyms.json:ro
    command:
      - python
      - -m
      - uvicorn
      - semantic_service:app
      - --host
      - 0.0.0.0
      - --port
      - "${SEMANTIC_PORT:-8010}"
      - --workers
      - "${SEMANTIC_WORKERS:-2}"
    healthcheck:
      test:
        - CMD-SHELL
        - python
        - -c
        - |
          import socket, sys, os
          try:
              port = int(os.getenv('SEMANTIC_PORT', '8010'))
              s = socket.socket()
              s.connect(("127.0.0.1", port))
              s.close()
          except Exception:
              sys.exit(1)
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres_registry:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
  embeddings-worker:
    image: docker.io/0x3654/gisp-semantic-onnx:latest
    #container_name: gisp_embeddings-worker
    labels:
      - com.centurylinklabs.watchtower.enable=true
    profiles:
      - embeddings
    env_file: .env
    working_dir: /app
    depends_on:
      - postgres_registry
      - semantic
    networks:
      - internal
    restart: "no"
    environment:
      FORCE: ${FORCE:-0}
      DRY_RUN: ${DRY_RUN:-0}
      SOURCE_FILES: ${SOURCE_FILES:-}
      EMBED_IDS: ${EMBED_IDS:-}
      LIMIT: ${LIMIT:-}
      SHARD_INDEX: "0"
      SHARD_COUNT: "1"
      BATCH_SIZE: "200"
    command: ["python3", "/app/update_embeddings.py"]
    deploy:
      restart_policy:
        condition: none
  starter-dump:
    image: docker.io/0x3654/gisp-starter:latest
    container_name: gisp_starter_dump
    labels:
      - com.centurylinklabs.watchtower.enable=true
    profiles:
      - starter
    env_file: .env
    environment:
      - SNAPSHOT_PATH=/app/registry_start_snapshot.sql.gz
      - STARTER_MAX_WAIT=180
      - FORCE=${STARTER_FORCE:-0}
      - POSTGRES_HOST=postgres_registry
      - POSTGRES_PORT=5432
      - POSTGRES_DB=registry
      - POSTGRES_USER=registry
    depends_on:
      - postgres_registry
    restart: "no"
    networks:
      - internal
networks:
  internal:
    internal: true
    name: registry-internal
    driver: bridge
  external:
    name: registry-external
    driver: bridge
